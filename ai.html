<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMX Pursuit: Ramp Master</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 250px;
            background-color: #fff;
            border-bottom: 4px solid #333;
            transition: background-color 1s;
        }
        #ui-layer {
            position: absolute;
            width: 100%;
            padding: 10px 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            font-size: 18px;
            color: #333;
            font-weight: bold;
            z-index: 10;
        }
        #instructions {
            position: absolute;
            width: 100%;
            top: 40%;
            text-align: center;
            color: #555;
            pointer-events: none;
            z-index: 10;
            font-weight: bold;
        }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <span id="high-score">HI 00000</span>
            <span id="score">00000</span>
        </div>
        <div id="instructions">SPACE TO JUMP<br>(Jump at the top of ramps!)</div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('game-container');
    const scoreEl = document.getElementById('score');
    const highscoreEl = document.getElementById('high-score');
    const instructions = document.getElementById('instructions');

    canvas.width = 800;
    canvas.height = 250;

    const GRAVITY = 0.6;
    const GROUND_Y = 210;
    let gameActive = false;
    let score = 0;
    let highScore = 0;
    let gameSpeed = 6.5;
    let spawnRate = 90; // Frames between spawns
    let obstacles = [];
    let frameCount = 0;
    let lastSpawnFrame = 0;
    let animationFrameId = null;

    const player = {
        x: 80, y: GROUND_Y, w: 30, h: 40, vy: 0, isJumping: false, angle: 0,
        draw() {
            ctx.save();
            ctx.translate(this.x + 15, this.y);
            ctx.rotate(this.angle);
            ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.fillStyle = "#333";
            ctx.beginPath(); ctx.arc(-12, -6, 6, 0, Math.PI * 2); ctx.arc(12, -6, 6, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-12, -6); ctx.lineTo(0, -15); ctx.lineTo(12, -15); ctx.lineTo(12, -6); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -15); ctx.lineTo(5, -30); ctx.stroke();
            ctx.beginPath(); ctx.arc(7, -35, 4, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.moveTo(4, -37); ctx.lineTo(-3, -37); ctx.stroke(); 
            ctx.restore();
        },
        update() {
            let onRamp = false;
            this.angle = 0;

            for (let obs of obstacles) {
                if (obs.type === 'ramp' && this.x + 15 > obs.x && this.x + 15 < obs.x + obs.w) {
                    let relX = (this.x + 15) - obs.x;
                    let targetY = GROUND_Y - (relX / obs.w) * obs.h;
                    if (!this.isJumping) {
                        this.y = targetY;
                        this.angle = -Math.atan2(obs.h, obs.w);
                        onRamp = true;
                    }
                }
            }

            if (!onRamp) {
                this.vy += GRAVITY;
                this.y += this.vy;
            }

            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y;
                this.vy = 0;
                this.isJumping = false;
            }
        },
        jump() {
            if (this.y > GROUND_Y - 65) {
                this.vy = -11.5;
                this.isJumping = true;
            }
        }
    };

    class Obstacle {
        constructor(type, xOffset = 0) {
            this.type = type;
            this.x = canvas.width + xOffset;
            this.w = (type === 'ramp') ? 90 : (type === 'police' ? 60 : (type === 'heli' ? 60 : 30));
            this.h = (type === 'ramp') ? 45 : (type === 'police' ? 25 : (type === 'heli' ? 20 : 30));
            this.y = (type === 'heli') ? 115 : (GROUND_Y - this.h);
            this.subType = Math.random() > 0.5 ? 'hydrant' : 'bench';
            this.sirenTimer = 0;
        }

        draw() {
            this.sirenTimer++;
            let sirenColor = (Math.floor(this.sirenTimer / 5) % 2 === 0) ? "#ff0000" : "#0000ff";

            if (this.type === 'ramp') {
                ctx.fillStyle = "#aaa";
                ctx.beginPath();
                ctx.moveTo(this.x, GROUND_Y);
                ctx.lineTo(this.x + this.w, GROUND_Y - this.h);
                ctx.lineTo(this.x + this.w, GROUND_Y);
                ctx.fill();
            } else if (this.type === 'police') {
                ctx.fillStyle = "#222"; ctx.fillRect(this.x, GROUND_Y - 20, this.w, 20);
                ctx.fillStyle = "white"; ctx.fillRect(this.x + 10, GROUND_Y - 28, 25, 10);
                ctx.fillStyle = sirenColor; ctx.fillRect(this.x + 15, GROUND_Y - 31, 10, 4);
            } else if (this.type === 'heli') {
                ctx.fillStyle = "#333"; ctx.fillRect(this.x, this.y, 40, 18);
                ctx.fillRect(this.x + 35, this.y + 5, 25, 4);
                ctx.fillStyle = "#666"; ctx.fillRect(this.x - 5, this.y - 3, 50, 3);
                ctx.fillStyle = sirenColor; ctx.beginPath(); ctx.arc(this.x + 5, this.y + 18, 4, 0, Math.PI*2); ctx.fill();
            } else {
                if (this.subType === 'hydrant') {
                    ctx.fillStyle = "#d32f2f"; 
                    ctx.fillRect(this.x + 5, GROUND_Y - 25, 15, 25);
                    ctx.fillRect(this.x, GROUND_Y - 18, 25, 6);
                    ctx.fillStyle = "#a11c1c";
                    ctx.fillRect(this.x, GROUND_Y - 19, 4, 8);
                    ctx.fillRect(this.x + 21, GROUND_Y - 19, 4, 8);
                    ctx.beginPath();
                    ctx.arc(this.x + 12.5, GROUND_Y - 23, 7.5, Math.PI, 0);
                    ctx.fill();
                    ctx.fillStyle = "#333";
                    ctx.fillRect(this.x + 10, GROUND_Y - 29, 5, 3);
                } else {
                    ctx.fillStyle = "#5d4037"; ctx.fillRect(this.x, GROUND_Y - 12, 35, 5);
                    ctx.fillRect(this.x + 2, GROUND_Y - 12, 3, 12); ctx.fillRect(this.x + 30, GROUND_Y - 12, 3, 12);
                }
            }
        }

        update() {
            let speedMod = (this.type === 'police') ? 1.4 : 1;
            this.x -= gameSpeed * speedMod;
        }
    }

    function resetGame() {
        if (Math.floor(score/10) > highScore) highScore = Math.floor(score/10);
        highscoreEl.innerText = `HI ${highScore.toString().padStart(5, '0')}`;
        
        gameActive = true;
        score = 0;
        obstacles = [];
        gameSpeed = 6.5;
        spawnRate = 90;
        frameCount = 0;
        lastSpawnFrame = 0;
        player.y = GROUND_Y;
        player.vy = 0;
        player.isJumping = false;
        
        instructions.style.display = 'none';
        container.style.backgroundColor = "white";
        
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animate();
    }

    function animate() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = "#333"; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke();

        let currentScoreNum = Math.floor(score / 10);

        // DIFFICULTY INCREASE EVERY 100 POINTS
        if (score > 0 && score % 1000 === 0) {
            gameSpeed += 0.5;
            spawnRate = Math.max(50, spawnRate - 3); // Obstacles come faster too
        }

        // Color shifts
        if (currentScoreNum > 200) container.style.backgroundColor = "#ffebee";
        else if (currentScoreNum > 100) container.style.backgroundColor = "#f5f5f5";

        player.update();
        player.draw();

        // Spawn logic
        if (frameCount - lastSpawnFrame > spawnRate) {
            let rand = Math.random();
            if (currentScoreNum > 200 && rand < 0.25) {
                obstacles.push(new Obstacle('heli'));
            } else if (currentScoreNum > 100 && rand < 0.35) {
                obstacles.push(new Obstacle('police'));
            } else if (rand < 0.5) {
                obstacles.push(new Obstacle('ramp'));
                obstacles.push(new Obstacle('object', 220)); 
            } else {
                obstacles.push(new Obstacle('object'));
            }
            lastSpawnFrame = frameCount;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update();
            obstacles[i].draw();
            let obs = obstacles[i];

            let pRight = player.x + 25, pLeft = player.x + 5, pTop = player.y - 32, pBot = player.y;
            let oRight = obs.x + obs.w, oLeft = obs.x, oTop = obs.y, oBot = obs.y + obs.h;

            if (pRight > oLeft && pLeft < oRight && pBot > oTop && pTop < oBot) {
                if (obs.type !== 'ramp') {
                    gameOver();
                    return;
                }
            }
            if (obs.x + obs.w < -200) obstacles.splice(i, 1);
        }

        score++;
        scoreEl.innerText = currentScoreNum.toString().padStart(5, '0');
        frameCount++;
        animationFrameId = requestAnimationFrame(animate);
    }

    function gameOver() {
        gameActive = false;
        cancelAnimationFrame(animationFrameId);
        instructions.style.display = 'block';
        instructions.innerHTML = "BUSTED!<br>SPACE TO RESTART";
    }

    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (!gameActive) resetGame();
            else player.jump();
        }
    });
</script>
</body>
</html>
